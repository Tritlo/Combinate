name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---- Build the Rust → WASM crates from source (the egg re-folder AND the
      # Turbo reducer), so the deployed bundle is reproducible and always matches
      # the catalog. Nothing pre-built is committed. ubuntu-latest ships Rust +
      # rustup; we add the wasm target, cache both crate builds, and pin wasm-pack. ----
      - run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/refold
            crates/reduce
      - name: Install wasm-pack (pinned)
        run: |
          curl -sSL https://github.com/rustwasm/wasm-pack/releases/download/v0.15.0/wasm-pack-v0.15.0-x86_64-unknown-linux-musl.tar.gz | tar -xz
          mv wasm-pack-*/wasm-pack "$HOME/.cargo/bin/wasm-pack"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:wasm # gen rules from the catalog, then wasm-pack build both crates → crates/{refold,reduce}/pkg/

      # ---- Fetch the vendored runtime assets we host ourselves: the MicroHs
      # live-compile runtime (batch blob, prewarmed cache, gallery dumps) and the
      # IoskeleyMono webfont. These are too heavy to build/regenerate here and
      # aren't committed, so they live on the `vendor-assets` Release and we pull
      # them in at deploy time. The private repo's assets need auth — the workflow's
      # GITHUB_TOKEN (contents: read) suffices. DuckDB is NOT vendored: it loads from
      # the jsDelivr CDN at runtime. ----
      - name: Fetch vendored runtime assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p public/vendor/mhs public/vendor/fonts
          gh release download vendor-assets --repo "$GITHUB_REPOSITORY" --pattern 'mhs-vendor.tar.gz' --dir .
          tar xzf mhs-vendor.tar.gz -C public/vendor/mhs
          rm mhs-vendor.tar.gz
          gh release download vendor-assets --repo "$GITHUB_REPOSITORY" --pattern 'IoskeleyMono-Regular.woff2' --dir public/vendor/fonts
          ls -la public/vendor/mhs public/vendor/mhs/examples public/vendor/fonts

      - run: npm run build # tsc --noEmit && vite build → dist/ (base "./" works at the combinate.app root or any subpath; public/ — incl. CNAME, og.png, vendor — is copied in)
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
