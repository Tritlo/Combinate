name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # vendor/microhs — the MicroHs Rust runtime, built below

      # ---- Build the Rust → WASM crates from source (the egg re-folder AND the
      # Turbo reducer), so the deployed bundle is reproducible and always matches
      # the catalog. Nothing pre-built is committed. ubuntu-latest ships Rust +
      # rustup; we add the wasm target, cache all three crate builds, and pin wasm-pack. ----
      - run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/refold
            crates/reduce
            vendor/microhs
      - name: Install wasm-pack (pinned)
        run: |
          curl -sSL https://github.com/rustwasm/wasm-pack/releases/download/v0.15.0/wasm-pack-v0.15.0-x86_64-unknown-linux-musl.tar.gz | tar -xz
          mv wasm-pack-*/wasm-pack "$HOME/.cargo/bin/wasm-pack"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:wasm # gen rules from the catalog, then wasm-pack build both crates → crates/{refold,reduce}/pkg/

      # ---- Build the MicroHs live-compile runtime (the Rust web dist) from the
      # vendored submodule: the wasm runtime, compiler.mjs/host.mjs, mhs.comb,
      # base.pkg, and the lib sources → public/vendor/mhs/. No emcc — cargo builds
      # the wasm directly; this replaced the emscripten batch blob + prewarm cache
      # (the mhs-vendor.tar.gz Release asset is retired).
      #
      # The expensive part is not cargo (~11s) but *running* the compiler wasm (the
      # dist smoke + one compile per gallery example, ~5 min), so the whole output —
      # dist + gallery closures — is cached, keyed on everything that feeds it: the
      # submodule pin, the build/gen scripts, the curated examples, and src/core
      # (the gen step re-reduces every closure through the core). An exact hit skips
      # both steps below; bump v1 to force a rebuild. ----
      - name: Compute the MicroHs submodule pin
        id: mhs-rev
        run: echo "sha=$(git rev-parse HEAD:vendor/microhs)" >> "$GITHUB_OUTPUT"
      - name: Cache the MicroHs dist + gallery closures
        id: mhs-dist
        uses: actions/cache@v4
        with:
          path: public/vendor/mhs
          key: mhs-dist-v1-${{ steps.mhs-rev.outputs.sha }}-${{ hashFiles('scripts/build-mhs-rust.sh', 'scripts/gen-mhs-examples.ts', 'src/view/mhs/examples.ts', 'src/core/**') }}
      - name: Build the MicroHs Rust web dist
        if: steps.mhs-dist.outputs.cache-hit != 'true'
        run: scripts/build-mhs-rust.sh
      # The curated gallery closures (examples/*.json) — compiled from the dist we
      # just built (node, not the browser), so "click an example" is instant instead
      # of a live compile. Fails the deploy if any example stops compiling.
      - name: Generate the gallery example closures
        if: steps.mhs-dist.outputs.cache-hit != 'true'
        run: npx tsx scripts/gen-mhs-examples.ts
      # Built or restored, the dist must be complete (wasm magic, manifest entries,
      # a closure per example) — a corrupt/partial cache restore fails here, cheaply.
      - name: Verify the MicroHs dist
        run: npx tsx scripts/check-mhs-dist.ts

      # ---- The IoskeleyMono editor webfont is still too heavy to regenerate here,
      # so it stays on the `vendor-assets` Release (auth: the workflow's GITHUB_TOKEN,
      # contents: read). DuckDB is NOT vendored — it loads from the jsDelivr CDN. ----
      - name: Fetch the editor webfont
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p public/vendor/fonts
          gh release download vendor-assets --repo "$GITHUB_REPOSITORY" --pattern 'IoskeleyMono-Regular.woff2' --dir public/vendor/fonts
          ls -la public/vendor/mhs public/vendor/fonts

      - run: npm run build # tsc --noEmit && vite build → dist/ (base "./" works at the combinate.app root or any subpath; public/ — incl. CNAME, og.png, vendor — is copied in)
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
