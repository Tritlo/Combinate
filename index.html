<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Combinate</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Link-sharing: description + OpenGraph / Twitter. og:image must be absolute,
         so it points at the custom domain; the favicon/og.png live in public/. -->
    <meta
      name="description"
      content="Drag ι, snap trees, and watch them reduce on their own. An interactive ι (iota) / SKI combinator-calculus sandbox — discover combinators, compile Haskell to combinator trees, and golf."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Combinate" />
    <meta property="og:title" content="Combinate" />
    <meta
      property="og:description"
      content="Drag ι, snap trees, and watch them reduce on their own. Discover combinators, compile Haskell to combinator trees, and golf."
    />
    <meta property="og:url" content="https://combinate.app/" />
    <meta property="og:image" content="https://combinate.app/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Combinate — a combinator H-tree in black, white and red." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Combinate" />
    <meta
      name="twitter:description"
      content="Drag ι, snap trees, and watch them reduce on their own. Discover combinators, compile Haskell, and golf."
    />
    <meta name="twitter:image" content="https://combinate.app/og.png" />
    <!-- Boot splash: a static shell that paints before any module loads, so the
         first frame is the wordmark + Y combinator art rather than a blank page.
         The colours mirror theme.ts (DARK / LIGHT) via prefers-color-scheme so the
         splash matches the app before its theme JS runs. src/splash.ts fills in the
         SVG art and drives the bar; main.ts fades it out once the scene is ready. -->
    <style>
      /* Mono (tricolor: ink + red-tier edges), mirroring theme.ts MONO_DARK/LIGHT. */
      :root {
        --sp-bg: #07090d; --sp-text: #f0f3f6; --sp-dim: #9aa3ad;
        --sp-ink: #f0f3f6; --sp-red: #ee4444; --sp-node: #f0f3f6;
        --sp-accent: #ee4444; --sp-track: #151b23;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --sp-bg: #ffffff; --sp-text: #000000; --sp-dim: #5a5a5a;
          --sp-ink: #000000; --sp-red: #cc2222; --sp-node: #000000;
          --sp-accent: #cc2222; --sp-track: #e6eaef;
        }
      }
      html, body { margin: 0; height: 100%; background: var(--sp-bg); }
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 22px; background: var(--sp-bg); color: var(--sp-text);
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        transition: opacity 0.5s ease;
      }
      #splash.done { opacity: 0; pointer-events: none; }
      #splash-title {
        margin: 0; font-size: clamp(28px, 6vw, 46px); font-weight: 600; letter-spacing: 0.04em;
      }
      #splash-art {
        width: clamp(220px, 46vw, 400px); height: clamp(220px, 46vw, 400px);
        opacity: 0; animation: sp-in 0.6s ease forwards;
      }
      #splash-art svg { width: 100%; height: 100%; overflow: visible; }
      @keyframes sp-in { from { opacity: 0; transform: scale(0.92); } to { opacity: 0.95; transform: scale(1); } }
      #splash-bar {
        width: clamp(180px, 40vw, 320px); height: 4px; border-radius: 2px;
        background: var(--sp-track); overflow: hidden;
      }
      #splash-fill {
        height: 100%; width: 0%; border-radius: 2px;
        background: var(--sp-accent); transition: width 0.3s ease;
      }
      #splash-msg { font-size: 13px; color: var(--sp-dim); min-height: 1em; }
    </style>
  </head>
  <body>
    <div id="splash" role="status" aria-label="Loading Combinate">
      <h1 id="splash-title">Combinate</h1>
      <div id="splash-art"></div>
      <div id="splash-bar"><div id="splash-fill"></div></div>
      <div id="splash-msg">Loading…</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
